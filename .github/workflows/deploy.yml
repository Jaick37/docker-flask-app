name: CI/CD Pipeline

on: [push]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run SAST scan with Bandit
        run: |
          pip install bandit
          bandit -r . -f txt

      - name: Build Docker image
        run: docker build -t myapp:${{ github.sha }} .

      - name: List Docker images
        run: docker images
